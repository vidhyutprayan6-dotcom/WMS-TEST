<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WMS 3PL — Test Platform</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/styles.css" />
  <script src="/config.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.4/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-brand">
        <img src="/assets/logo.svg" alt="WMS 3PL" class="brand-logo" width="180" height="40" />
        <span class="topbar-title">Test Platform</span>
      </div>
      <div class="topbar-status">
        <span id="connectionStatus" class="status-pill">Not connected</span>
        <span id="tenantStatus" class="status-pill muted">No tenant</span>
      </div>
      <div class="topbar-actions">
        <button type="button" id="loadSeedBtn" class="btn btn-sm secondary">Load Seed IDs</button>
        <button type="button" id="useClientABtn" class="btn btn-sm secondary">Client A</button>
        <button type="button" id="useClientBBtn" class="btn btn-sm secondary">Client B</button>
      </div>
    </header>

    <div class="app-body">
      <aside class="sidebar">
        <div class="sidebar-section">
          <h3 class="sidebar-heading">Setup</h3>
          <button type="button" class="nav-item active" data-test="setup">Connection & Tenant</button>
        </div>
        <div class="sidebar-section">
          <h3 class="sidebar-heading">Core API Tests</h3>
          <button type="button" class="nav-item" data-test="inventory">List Inventory</button>
          <button type="button" class="nav-item" data-test="billing">Generate Invoice</button>
          <button type="button" class="nav-item" data-test="transfer">Inventory Transfer</button>
          <button type="button" class="nav-item" data-test="audit">Audit Logs</button>
        </div>
        <div class="sidebar-section">
          <h3 class="sidebar-heading">Validation Tests</h3>
          <button type="button" class="nav-item" data-test="edge-insufficient">Insufficient Stock</button>
          <button type="button" class="nav-item" data-test="edge-samebin">Same Bin Transfer</button>
          <button type="button" class="nav-item" data-test="edge-notenant">Missing Tenant</button>
        </div>
      </aside>

      <main class="workspace">
        <section class="panel panel-conditions">
          <div class="panel-head">
            <h2 id="testTitle">Connection & Tenant</h2>
            <p id="testSummary" class="panel-subtitle">Configure API URL and tenant headers. Seed data auto-fills test conditions.</p>
          </div>
          <div id="conditionsBody" class="panel-body"></div>
          <div class="panel-foot">
            <button type="button" id="runTestBtn" class="btn primary">Run Test</button>
          </div>
        </section>

        <section class="panel panel-results">
          <div class="panel-head results-head">
            <div>
              <h2>Results</h2>
              <p class="panel-subtitle">Response output for the selected test</p>
            </div>
            <div class="results-toolbar">
              <span id="statusBadge" class="badge">—</span>
              <button type="button" id="downloadPdfBtn" class="btn btn-sm secondary hidden">Load PDF</button>
              <button type="button" id="toggleJsonBtn" class="btn btn-sm secondary hidden">Show JSON</button>
            </div>
          </div>
          <div id="resultsBody" class="panel-body results-body">
            <p class="placeholder">Select a test and click <strong>Run Test</strong>.</p>
          </div>
          <pre id="jsonOutput" class="json-output hidden"></pre>
        </section>
      </main>
    </div>
  </div>

  <!-- Hidden config fields (persisted, not shown in main UI) -->
  <input type="hidden" id="baseUrl" />
  <input type="hidden" id="clientId" />
  <input type="hidden" id="userId" />
  <input type="hidden" id="invoiceMonth" />
  <input type="hidden" id="productId" />
  <input type="hidden" id="fromBinId" />
  <input type="hidden" id="toBinId" />
  <input type="hidden" id="batchNumber" />
  <input type="hidden" id="expiryDate" />
  <input type="hidden" id="quantity" />

  <div id="toastContainer" class="toast-container" aria-live="polite"></div>
  <script src="/invoice-pdf.js"></script>
  <script src="/app.js"></script>
</body>
</html>
